<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trust Ledger - Login</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h1>Trust Ledger</h1>
        <p>Gold Loan Management System</p>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Login</button>
            <p id="errorMsg" style="color: red; display: none; margin-top: 10px;">Invalid credentials</p>
        </form>
    </div>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', redirectIfAuthenticated);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('errorMsg').style.display = 'none';
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    credentials: 'same-origin',
                    body: new URLSearchParams(formData)
                });
                
                if (response.ok) {
                    window.location.href = './dashboard.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
