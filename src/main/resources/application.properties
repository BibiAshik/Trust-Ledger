spring.application.name=Trust Ledger
server.port=${PORT:8080}
# Uncomment the line below to load local database and secrets during local development
# spring.profiles.active=local


# Database Configuration
spring.datasource.url=${DATABASE_URL:}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.session.store-type=none
# Initial admin user will be created via DataInitializer

# ============================================================
# JWT Configuration
# ============================================================
# IMPORTANT: Change this secret to a long random string in production!
jwt.secret=${JWT_SECRET:}
jwt.expiration.ms=86400000

# ============================================================
# Email (SMTP) Configuration for Password Reset
# ============================================================
# Fill in your Gmail address and App Password below.
# To get an App Password: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# ============================================================
# Razorpay Configuration
# ============================================================
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================================
# App Base URL (used in password reset email links)
# ============================================================
app.base-url=${APP_BASE_URL:}

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
