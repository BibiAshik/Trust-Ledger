spring.application.name=Trust Ledger
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/trust_ledger?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:your_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Initial admin user will be created via DataInitializer
