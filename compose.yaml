services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: trust_ledger
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - trust-ledger-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/trust_ledger?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
    ports:
      - "8080:8080"

volumes:
  trust-ledger-mysql:
